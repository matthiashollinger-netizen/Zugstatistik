<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .t{fill:#202020;font-size:15px} .tm{fill:#5a5a5a;font-size:14px} .tw{fill:#fff;font-size:14px}
    .btnP{fill:#0067c0} .btn{fill:#fdfdfd;stroke:#c0c0c0}
    .cap{fill:#e2001a;font-size:13px;font-weight:600} .arr{stroke:#e2001a;stroke-width:2;fill:none}
  </style>
  <!-- Browserfenster-Ausschnitt -->
  <rect x="20" y="20" width="560" height="320" rx="8" fill="#faf9f8" stroke="#d0d0d0"/>
  <rect x="20" y="20" width="560" height="44" rx="8" fill="#e9e8e7"/>
  <rect x="20" y="52" width="560" height="12" fill="#e9e8e7"/>
  <circle cx="44" cy="42" r="5" fill="#c8c8c8"/><circle cx="62" cy="42" r="5" fill="#c8c8c8"/>
  <rect x="86" y="32" width="360" height="20" rx="10" fill="#fff" stroke="#d8d8d8"/>
  <text x="98" y="46" class="tm" font-size="12">🔒 matthiashollinger-netizen.github.io/Zugstatistik</text>
  <!-- Berechtigungs-Popover -->
  <rect x="92" y="78" width="360" height="172" rx="10" fill="#fff" stroke="#cfcfcf"/>
  <polygon points="120,78 132,78 126,68" fill="#fff" stroke="#cfcfcf"/>
  <text x="116" y="116" class="t" font-weight="600">Diese Website möchte Dateien auf</text>
  <text x="116" y="138" class="t" font-weight="600">diesem Gerät anzeigen und bearbeiten</text>
  <text x="116" y="166" class="tm">Statistik.json</text>
  <rect x="116" y="196" width="150" height="32" rx="5" class="btnP"/>
  <text x="132" y="217" class="tw">Bearbeiten zulassen</text>
  <rect x="278" y="196" width="92" height="32" rx="5" class="btn"/>
  <text x="296" y="217" class="t" font-size="14">Abbrechen</text>
  <!-- Callout -->
  <circle cx="620" cy="212" r="14" fill="#e2001a"/><text x="615" y="217" fill="#fff" font-size="14" font-weight="700">!</text>
  <path class="arr" d="M606 212 H380 M380 212 l8 -5 M380 212 l8 5"/>
  <text x="644" y="200" class="cap">Einmalig bestätigen –</text>
  <text x="644" y="218" class="cap">„Bearbeiten zulassen“.</text>
  <text x="644" y="240" class="cap">Genauer Wortlaut je nach</text>
  <text x="644" y="257" class="cap">Edge-Version etwas anders.</text>
</svg>
