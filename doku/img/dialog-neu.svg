<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .win{fill:#fff} .chrome{fill:#f3f3f3} .line{stroke:#e0e0e0;stroke-width:1}
    .t{fill:#202020;font-size:14px} .tm{fill:#606060;font-size:13px} .tw{fill:#fff;font-size:14px}
    .nav{fill:#202020;font-size:13px} .selrow{fill:#cce4f7}
    .btnP{fill:#0067c0} .btn{fill:#fdfdfd;stroke:#c0c0c0}
    .field{fill:#fff;stroke:#0067c0;stroke-width:2}
    .leg{fill:#202020;font-size:14px} .legb{fill:#202020;font-size:14px;font-weight:600}
    .num{fill:#e2001a} .numt{fill:#fff;font-size:13px;font-weight:700}
  </style>
  <rect x="20" y="20" width="600" height="420" rx="8" class="win" stroke="#d0d0d0"/>
  <rect x="20" y="20" width="600" height="40" rx="8" class="chrome"/>
  <rect x="20" y="48" width="600" height="12" class="chrome"/>
  <text x="40" y="45" class="t" font-weight="600">Speichern unter</text>
  <text x="592" y="45" class="tm" font-size="16">✕</text>
  <rect x="40" y="74" width="500" height="28" rx="4" fill="#fff" stroke="#d0d0d0"/>
  <text x="52" y="93" class="tm">OneDrive  ›  Zug 11  ›  Statistik</text>
  <line x1="20" y1="116" x2="620" y2="116" class="line"/>
  <text x="40" y="140" class="tm" font-size="11">SCHNELLZUGRIFF</text>
  <text x="40" y="164" class="nav">🗎  Desktop</text>
  <text x="40" y="190" class="nav">🗎  Dokumente</text>
  <text x="38" y="224" class="tm" font-size="11">ONEDRIVE</text>
  <rect x="28" y="234" width="168" height="26" rx="4" class="selrow"/>
  <text x="40" y="252" class="nav" font-weight="600">☁  Zug 11 (geteilt)</text>
  <text x="40" y="284" class="nav">💻  Dieser PC</text>
  <line x1="210" y1="124" x2="210" y2="362" class="line"/>
  <text x="230" y="150" class="tm">Name</text>
  <line x1="230" y1="160" x2="600" y2="160" class="line"/>
  <text x="230" y="186" class="tm">🗎  (noch keine Statistik-Datei)</text>
  <text x="40" y="394" class="t">Dateiname:</text>
  <rect x="120" y="378" width="300" height="26" rx="3" class="field"/>
  <text x="132" y="396" class="t" font-weight="600">Statistik.json</text>
  <text x="40" y="428" class="t">Dateityp:</text>
  <rect x="120" y="412" width="300" height="24" rx="3" fill="#fff" stroke="#c0c0c0"/>
  <text x="132" y="429" class="tm">Statistik-Datei (JSON) (*.json)</text>
  <text x="408" y="429" class="tm">▾</text>
  <rect x="440" y="378" width="92" height="30" rx="4" class="btnP"/>
  <text x="462" y="398" class="tw">Speichern</text>
  <rect x="440" y="412" width="92" height="24" rx="4" class="btn"/>
  <text x="457" y="429" class="t">Abbrechen</text>

  <!-- Marker direkt am Ziel -->
  <circle cx="186" cy="247" r="12" class="num"/><text x="182" y="252" class="numt">1</text>
  <circle cx="108" cy="391" r="12" class="num"/><text x="104" y="396" class="numt">2</text>
  <circle cx="486" cy="361" r="12" class="num"/><text x="482" y="366" class="numt">3</text>
  <path d="M486 373 V376" stroke="#e2001a" stroke-width="2"/>

  <!-- Legende rechts -->
  <circle cx="668" cy="150" r="12" class="num"/><text x="664" y="155" class="numt">1</text>
  <text x="690" y="148" class="leg">Links den geteilten</text>
  <text x="690" y="166" class="legb">OneDrive-Ordner wählen</text>
  <circle cx="668" cy="210" r="12" class="num"/><text x="664" y="215" class="numt">2</text>
  <text x="690" y="208" class="leg">Dateiname exakt</text>
  <text x="690" y="226" class="legb">Statistik.json eintippen</text>
  <circle cx="668" cy="270" r="12" class="num"/><text x="664" y="275" class="numt">3</text>
  <text x="690" y="268" class="leg">Auf</text>
  <text x="690" y="286" class="legb">„Speichern“ klicken</text>
</svg>
